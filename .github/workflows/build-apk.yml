name: Build APK
on:
  workflow_dispatch:
    inputs:
      app_id:
        required: true
        type: string
      build_dir:
        required: true
        type: string
      webhook_url:
        required: true
        type: string
      r2_bucket:
        required: true
        type: string
      r2_access_key:
        required: true
        type: string
      r2_secret_key:
        required: true
        type: string
      r2_public_url:
        required: true
        type: string
      r2_account_id:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x ${{ inputs.build_dir }}/gradlew

      - name: Build APK
        run: |
          cd ${{ inputs.build_dir }}
          ./gradlew assembleRelease

      - name: Install AWS CLI
        run: |
          sudo apt-get update && sudo apt-get install -y awscli

      - name: Upload APK to R2
        id: upload
        run: |
          APK_PATH=$(find ${{ inputs.build_dir }} -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi
          FILENAME="${{ inputs.app_id }}-$(date +%s).apk"
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Upload attempt $i of $MAX_RETRIES..."
            if AWS_ACCESS_KEY_ID=${{ inputs.r2_access_key }} \
               AWS_SECRET_ACCESS_KEY=${{ inputs.r2_secret_key }} \
               aws s3 cp "$APK_PATH" "s3://${{ inputs.r2_bucket }}/apks/$FILENAME" \
                 --endpoint-url "https://${{ inputs.r2_account_id }}.r2.cloudflarestorage.com" \
                 --region auto; then
              echo "Upload successful!"
              echo "apk_url=${{ inputs.r2_public_url }}/apks/$FILENAME" >> $GITHUB_OUTPUT
              exit 0
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Upload failed, waiting 10s before retry..."
              sleep 10
            fi
          done
          echo "All $MAX_RETRIES upload attempts failed!"
          exit 1

      - name: Notify webhook (success)
        if: success()
        run: |
          curl -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -d '{"app_id": "${{ inputs.app_id }}", "status": "success", "apk_url": "'${{ steps.upload.outputs.apk_url }}'"}'

      - name: Notify webhook (failure)
        if: failure()
        run: |
          curl -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -d '{"app_id": "${{ inputs.app_id }}", "status": "failed", "error": "Build failed"}'
